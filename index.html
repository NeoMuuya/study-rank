<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Rank</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar" aria-label="概要">
        <div>
          <p class="eyebrow">Study Rank</p>
          <h1>勉強時間ランキング</h1>
        </div>
        <div class="stats-strip">
          <div>
            <span id="totalHours">0</span>
            <small>合計時間</small>
          </div>
          <div>
            <span id="memberCount">0</span>
            <small>参加人数</small>
          </div>
          <div>
            <span id="topScore">0</span>
            <small>トップスコア</small>
          </div>
        </div>
      </section>

      <section class="workspace" aria-label="入力とランキング">
        <form id="studyForm" class="entry-panel">
          <div class="form-row">
            <label for="studentName">名前</label>
            <input id="studentName" name="studentName" type="text" autocomplete="name" placeholder="例: あおい" required />
          </div>
          <div class="form-grid">
            <div class="form-row">
              <label for="studyHours">時間</label>
              <input id="studyHours" name="studyHours" type="number" min="0" max="24" step="0.25" placeholder="2" required />
            </div>
            <div class="form-row">
              <label for="studyMinutes">分</label>
              <input id="studyMinutes" name="studyMinutes" type="number" min="0" max="59" step="5" placeholder="30" />
            </div>
          </div>
          <div class="form-row">
            <label for="studySubject">科目</label>
            <select id="studySubject" name="studySubject">
              <option value="数学">数学</option>
              <option value="英語">英語</option>
              <option value="国語">国語</option>
              <option value="理科">理科</option>
              <option value="社会">社会</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <button class="primary-action" type="submit">記録する</button>
        </form>

        <section class="ranking-panel" aria-label="ランキング">
          <div class="panel-heading">
            <h2>順位</h2>
            <button id="resetButton" class="ghost-action" type="button">リセット</button>
          </div>
          <ol id="rankingList" class="ranking-list"></ol>
          <p id="emptyState" class="empty-state">まだ記録がありません。最初の勉強時間を入れてみましょう。</p>
        </section>
      </section>

      <section class="history-panel" aria-label="最近の記録">
        <div class="panel-heading">
          <h2>最近の記録</h2>
          <span id="lastUpdated">未更新</span>
        </div>
        <ul id="historyList" class="history-list"></ul>
      </section>
    </main>

    <section id="adminModal" class="modal-backdrop" hidden aria-label="管理者操作">
      <form id="adminForm" class="admin-modal">
        <div>
          <h2 id="adminModalTitle">管理者確認</h2>
          <p id="adminModalDescription">管理者コードを入力してください。</p>
        </div>
        <div class="form-row">
          <label for="adminCode">管理者コード</label>
          <input id="adminCode" type="password" autocomplete="off" required />
        </div>
        <div id="adminTimeFields" class="form-grid">
          <div class="form-row">
            <label for="adminHours">時間</label>
            <input id="adminHours" type="number" min="0" step="1" />
          </div>
          <div class="form-row">
            <label for="adminMinutes">分</label>
            <input id="adminMinutes" type="number" min="0" max="59" step="1" />
          </div>
        </div>
        <p id="adminError" class="admin-error" role="alert"></p>
        <div class="modal-actions">
          <button id="adminCancelButton" class="ghost-action" type="button">キャンセル</button>
          <button id="adminConfirmButton" class="primary-action" type="submit">実行</button>
        </div>
      </form>
    </section>

    <script src="app.js"></script>
  </body>
</html>
